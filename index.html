<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Stokpile — Group Savings & Payouts</title>
    <meta name="description" content="Transparent group savings management. Track contributions, schedule payouts, and organise meetings for your stokvel or savings group." />
    <meta name="theme-color" content="#007a38" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stokpile — Group Savings & Payouts" />
    <meta property="og:description" content="Transparent group savings management. Track contributions, schedule payouts, and organise meetings for your stokvel or savings group." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:site_name" content="Stokpile" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Stokpile — Group Savings & Payouts" />
    <meta name="twitter:description" content="Transparent group savings management for stokvels and savings groups." />
    <meta name="twitter:image" content="/icon-512.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stokpile" />
  </head>

  <body>
    <!-- Apply theme before paint to prevent flash -->
    <script>
      (function(){var t=localStorage.getItem('stokpile-theme');if(t==='light'){}else{document.documentElement.classList.add('dark')}})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
