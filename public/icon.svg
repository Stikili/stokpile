<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007a38"/>
      <stop offset="100%" stop-color="#005a28"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Bottom Coin -->
  <ellipse cx="256" cy="360" rx="140" ry="40" fill="#fff" opacity="0.15"/>
  <ellipse cx="256" cy="360" rx="140" ry="40" fill="none" stroke="#fff" stroke-width="6"/>

  <!-- Middle Coin -->
  <ellipse cx="256" cy="280" rx="130" ry="35" fill="#fff" opacity="0.25"/>
  <ellipse cx="256" cy="280" rx="130" ry="35" fill="none" stroke="#fff" stroke-width="6"/>

  <!-- Top Coin -->
  <ellipse cx="256" cy="210" rx="120" ry="30" fill="#fff" opacity="0.35"/>
  <ellipse cx="256" cy="210" rx="120" ry="30" fill="none" stroke="#fff" stroke-width="6"/>

  <!-- Coin stack sides -->
  <line x1="116" y1="360" x2="136" y2="210" stroke="#fff" stroke-width="3" opacity="0.2"/>
  <line x1="396" y1="360" x2="376" y2="210" stroke="#fff" stroke-width="3" opacity="0.2"/>

  <!-- Dollar sign on top coin -->
  <text x="256" y="222" fill="#fff" font-size="55" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">$</text>

  <!-- People figures -->
  <!-- Left person -->
  <circle cx="196" cy="105" r="24" fill="#fff"/>
  <path d="M168 135 Q196 128 224 135" stroke="#fff" fill="#fff" stroke-width="12" stroke-linecap="round"/>

  <!-- Center person (larger) -->
  <circle cx="256" cy="95" r="28" fill="#fff"/>
  <path d="M224 130 Q256 122 288 130" stroke="#fff" fill="#fff" stroke-width="12" stroke-linecap="round"/>

  <!-- Right person -->
  <circle cx="316" cy="105" r="24" fill="#fff"/>
  <path d="M288 135 Q316 128 344 135" stroke="#fff" fill="#fff" stroke-width="12" stroke-linecap="round"/>

  <!-- Growth arrow -->
  <g opacity="0.7">
    <line x1="380" y1="170" x2="420" y2="120" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <polyline points="400,120 420,120 420,140" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
